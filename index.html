<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demografia – iframe fullscreen sticky</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    .iframe-stage {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #fff;
    }

    .iframe-stage iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="iframe-stage">
    <iframe
      src="https://giovannisantarelli7.github.io/demografia/"
      title="Popolazione per fasce d’età nel cratere del terremoto"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
